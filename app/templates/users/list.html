{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Usuários</h2>
  <a href="/users/new" class="btn btn-dark">Novo usuário</a>
</div>

<div class="card shadow-sm">
  <div class="card-body table-responsive">
    <table class="table table-hover align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Perfil</th>
          <th>Status</th>
          <th style="width: 280px;">Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for row in users %}
        <tr>
          <td>{{ row.id }}</td>
          <td>{{ row.full_name }}</td>
          <td>{{ row.email }}</td>
          <td>
            <span class="badge text-bg-secondary">{{ row.role.name }}</span>
          </td>
          <td>
            {% if row.is_active %}
              <span class="badge text-bg-success">Ativo</span>
            {% else %}
              <span class="badge text-bg-danger">Inativo</span>
            {% endif %}
          </td>
          <td>
            <div class="d-flex gap-2 flex-wrap">
              <a href="/users/{{ row.id }}/edit" class="btn btn-sm btn-outline-primary">Editar</a>

              <form method="post" action="/users/{{ row.id }}/toggle-active">
                <button type="submit" class="btn btn-sm btn-outline-warning">
                  {% if row.is_active %}Inativar{% else %}Ativar{% endif %}
                </button>
              </form>

              <form method="post" action="/users/{{ row.id }}/delete" onsubmit="return confirm('Deseja excluir este usuário?');">
                <button type="submit" class="btn btn-sm btn-outline-danger">Excluir</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
