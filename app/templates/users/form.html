{% extends 'base.html' %}
{% block content %}
<h2 class="mb-3">{% if target_user %}Editar usuário{% else %}Novo usuário{% endif %}</h2>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="{{ action_url }}" class="card shadow-sm p-4">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nome completo</label>
      <input
        name="full_name"
        class="form-control"
        required
        value="{{ target_user.full_name if target_user else '' }}"
      >
    </div>

    <div class="col-md-6">
      <label class="form-label">E-mail</label>
      <input
        name="email"
        type="email"
        class="form-control"
        required
        value="{{ target_user.email if target_user else '' }}"
      >
    </div>

    <div class="col-md-4">
      <label class="form-label">
        {% if target_user %}Nova senha (opcional){% else %}Senha{% endif %}
      </label>
      <input
        name="password"
        type="password"
        class="form-control"
        {% if not target_user %}required{% endif %}
      >
    </div>

    <div class="col-md-4">
      <label class="form-label">Perfil</label>
      <select name="role_id" class="form-select" required>
        {% for role in roles %}
        <option
          value="{{ role.id }}"
          {% if target_user and target_user.role_id == role.id %}selected{% endif %}
        >
          {{ role.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-4 d-flex align-items-end">
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          name="is_active"
          id="is_active"
          {% if not target_user or target_user.is_active %}checked{% endif %}
        >
        <label class="form-check-label" for="is_active">
          Usuário ativo
        </label>
      </div>
    </div>
  </div>

  <div class="mt-4 d-flex gap-2">
    <button class="btn btn-dark">Salvar</button>
    <a href="/users/" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
