<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ request.app.title }}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex">
    <aside class="sidebar bg-dark text-white p-3">
      <h4 class="mb-4">CRM Pro</h4>

      <nav class="nav flex-column gap-1">
        <a class="nav-link text-white" href="/">Dashboard</a>
        <a class="nav-link text-white" href="/customers/">Clientes</a>
        <a class="nav-link text-white" href="/products/">Produtos</a>
        <a class="nav-link text-white" href="/opportunities/">Oportunidades</a>
        <a class="nav-link text-white" href="/proposals/">Propostas</a>

        {% if user and user.role.name == 'admin' %}
        <a class="nav-link text-white" href="/proposal-base/">Base da Proposta</a>
        <a class="nav-link text-white" href="/users/">Usuários</a>
        <a class="nav-link text-white" href="/pricing/">Tabela de preços</a>
        {% endif %}

        <a class="nav-link text-white" href="/settings/">Configurações</a>
        <a class="nav-link text-danger" href="/logout">Sair</a>
      </nav>
    </aside>

    <main class="content flex-grow-1 p-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
