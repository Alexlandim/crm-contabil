{% extends 'base.html' %}
{% block content %}
<h2 class="mb-3">Novo cliente/lead</h2>
<form method="post" class="card shadow-sm p-4">
  <div class="row g-3">
    <div class="col-md-3"><label class="form-label">Tipo</label><select name="kind" class="form-select"><option value="lead">Lead</option><option value="prospect">Prospect</option><option value="cliente">Cliente</option></select></div>
    <div class="col-md-9"><label class="form-label">Nome/Razão social</label><input name="legal_name" class="form-control" required></div>
    <div class="col-md-6"><label class="form-label">Nome fantasia</label><input name="trade_name" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">CPF/CNPJ</label><input name="document" class="form-control"></div>
    <div class="col-md-4"><label class="form-label">E-mail</label><input name="email" type="email" class="form-control"></div>
    <div class="col-md-4"><label class="form-label">Telefone</label><input name="phone" class="form-control"></div>
    <div class="col-md-4"><label class="form-label">WhatsApp</label><input name="whatsapp" class="form-control"></div>
    <div class="col-md-4"><label class="form-label">Cidade</label><input name="city" class="form-control"></div>
    <div class="col-md-2"><label class="form-label">UF</label><input name="state" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">Segmento</label><input name="segment" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">Responsável contato</label><input name="contact_name" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">Cargo</label><input name="contact_role" class="form-control"></div>
    <div class="col-md-6"><label class="form-label">Origem do lead</label><input name="lead_source" class="form-control"></div>
    <div class="col-md-12"><label class="form-label">Observações</label><textarea name="notes" class="form-control" rows="4"></textarea></div>
  </div>
  <div class="mt-4"><button class="btn btn-dark">Salvar</button></div>
</form>
{% endblock %}
